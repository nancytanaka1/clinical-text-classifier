# configs/prod.yml — Production environment overrides
resources:
  jobs:
    eda_job:
      schedule:
        pause_status: PAUSED
    prepare_data_job:
      schedule:
        quartz_cron_expression: "0 0 1 ? * SUN"
        timezone_id: America/Los_Angeles
        pause_status: UNPAUSED
    training_job:
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"
        timezone_id: America/Los_Angeles
        pause_status: UNPAUSED
      email_notifications:
        on_failure:
          - nancytanaka1@gmail.com
      max_retries: 2
      retry_on_timeout: true
    test_job:
      schedule:
        pause_status: PAUSED

variables:
  node_type: Standard_D4ds_v4
  autotermination_minutes: 60
  max_workers: 0
  unity_catalog: prod
  schema: clinical_nlp
